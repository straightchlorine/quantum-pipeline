# Spark configuration for Quantum ML pipeline
# Credentials are provided via AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars
# (read by EnvironmentVariableCredentialsProvider - not embedded in JVM args)

# JARs resolved via Maven/Ivy at startup (cached in spark-ivy-cache volume)
spark.jars.packages                                     org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.iceberg:iceberg-aws:1.10.1,org.apache.hadoop:hadoop-aws:3.4.3,org.apache.spark:spark-avro_2.13:4.0.2
spark.jars.ivy                                          /home/spark/.ivy2

spark.serializer                                        org.apache.spark.serializer.KryoSerializer
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog                         org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type                    hive
spark.sql.catalog.iceberg                               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type                          hadoop
spark.sql.catalog.iceberg.warehouse                     s3a://warehouse/
spark.sql.catalog.iceberg.io-impl                       org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.iceberg.s3.endpoint                   http://garage:3901
spark.sql.catalog.iceberg.s3.path-style-access          true
spark.sql.catalog.iceberg.s3.region                     garage
spark.hadoop.fs.s3a.endpoint                            http://garage:3901
spark.hadoop.fs.s3a.endpoint.region                     garage
spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.path.style.access                   true
spark.hadoop.fs.s3a.connection.ssl.enabled              false
spark.hadoop.fs.s3a.aws.credentials.provider            org.apache.hadoop.fs.s3a.auth.EnvironmentVariableCredentialsProvider
