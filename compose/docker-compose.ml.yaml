volumes:
  garage-data:
    name: quantum-garage-data
  garage-meta:
    name: quantum-garage-meta
  spark-warehouse:
    name: quantum-ml-spark-warehouse
  spark-ivy-cache:
    name: quantum-ml-spark-ivy-cache
  airflow-postgres-data:
    name: quantum-ml-airflow-postgres
  airflow-logs:
    name: quantum-ml-airflow-logs
  redis-data:
    name: quantum-ml-redis-data
  mlflow-data:
    name: quantum-ml-mlflow-data
  kafka-data:
    name: quantum-ml-kafka-data

networks:
  quantum-net:
    name: quantum-ml-network
    driver: bridge

x-airflow-common:
  &airflow-common
  build:
    context: ..
    dockerfile: ./docker/Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW_DAGS_PAUSED_AT_CREATION:-True}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES:-False}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # S3 credentials for Spark/Airflow DAGs
    S3_ACCESS_KEY: ${S3_ACCESS_KEY}
    S3_SECRET_KEY: ${S3_SECRET_KEY}
    S3_ENDPOINT: ${S3_ENDPOINT:-http://garage:3901}
  volumes: &airflow-common-volumes
    - ../docker/airflow/:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  networks:
    - quantum-net
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # --- kafka + schema registry + connect ---

  kafka:
    image: apache/kafka:${KAFKA_VERSION:-4.2.0}
    container_name: ml-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
      - "${KAFKA_INTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID:-1}@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST_IP:-localhost}:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: quantum-ml-kafka-cluster-id-01
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data

  schema-registry:
    image: confluentinc/cp-schema-registry:${SCHEMA_REGISTRY_VERSION:-8.2.0}
    container_name: ml-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "${KAFKA_SERVERS:-kafka:9092}"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: "${SCHEMA_REGISTRY_TOPIC:-_schemas}"
      SCHEMA_REGISTRY_HOST_NAME: "${SCHEMA_REGISTRY_HOSTNAME:-schema-registry}"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "-s", "http://localhost:8081/subjects"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s

  kafka-connect:
    image: confluentinc/cp-kafka-connect:${KAFKA_CONNECT_VERSION:-8.2.0}
    container_name: ml-kafka-connect
    restart: unless-stopped
    ports:
      - "${KAFKA_CONNECT_PORT:-8083}:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "${KAFKA_SERVERS:-kafka:9092}"
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "ml-connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "ml-connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "ml-connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "ml-connect-status"
      CONNECT_KEY_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_LOG4J_ROOT_LOGLEVEL: "${KAFKA_CONNECT_LOG_LEVEL:-INFO}"
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect.runtime.rest=WARN,org.reflections=ERROR"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      # Standard AWS SDK env var names (used by the S3 Sink connector)
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_KEY}"
    command:
      - bash
      - -c
      - |
        echo "Installing S3 connector plugin..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.17
        echo "Launching Kafka Connect worker..."
        /etc/confluent/docker/run
    networks:
      - quantum-net
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  kafka-connect-init:
    image: curlimages/curl
    container_name: ml-kafka-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Registering Garage S3 Sink Connector...';
        for i in 1 2 3 4 5; do
          if curl -X POST -H 'Content-Type: application/json' \
            --data @/connectors/garage-sink-config.json \
            http://kafka-connect:8083/connectors; then
            echo '';
            echo 'Garage Sink Connector registered successfully!';
            exit 0;
          else
            echo 'Attempt failed, retrying in 5s...';
            sleep 5;
          fi;
        done;
        echo 'Failed to register connector after 5 attempts';
        exit 1;
      "
    volumes:
      - ../docker/connectors/garage-sink-config.json:/connectors/garage-sink-config.json
    networks:
      - quantum-net

  # --- garage (s3-compatible storage) ---

  garage:
    image: dxflrs/garage:${GARAGE_VERSION:-v2.2.0}
    container_name: ml-garage
    restart: unless-stopped
    ports:
      - "${GARAGE_S3_API_PORT:-3901}:3901"
      - "${GARAGE_ADMIN_PORT:-3903}:3903"
    volumes:
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
    environment:
      GARAGE_RPC_BIND_ADDR: "[::]:3900"
      GARAGE_RPC_SECRET: "${GARAGE_RPC_SECRET}"
      GARAGE_S3_API_BIND_ADDR: "[::]:3901"
      GARAGE_S3_REGION: "${S3_REGION:-garage}"
      GARAGE_ADMIN_API_BIND_ADDR: "[::]:3903"
      GARAGE_ADMIN_TOKEN: "${GARAGE_ADMIN_TOKEN}"
      GARAGE_REPLICATION_FACTOR: 1
      GARAGE_DB_ENGINE: lmdb
      GARAGE_METADATA_DIR: /var/lib/garage/meta
      GARAGE_DATA_DIR: /var/lib/garage/data
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H \"Authorization: Bearer ${GARAGE_ADMIN_TOKEN}\" http://localhost:3903/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --- spark ---

  spark-master:
    image: apache/spark:${SPARK_VERSION:-4.0.2}-python3
    container_name: ml-spark-master
    command: /opt/spark/sbin/start-master.sh
    environment: &spark-common-env
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_NO_DAEMONIZE: "true"
      # S3 credentials via env vars - read by EnvironmentVariableCredentialsProvider
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
    volumes:
      - spark-warehouse:/opt/spark/warehouse
      - spark-ivy-cache:/home/spark/.ivy2
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    ports:
      - "127.0.0.1:8080:8080"
      - "7077:7077"
    networks:
      - quantum-net
    depends_on:
      - garage

  spark-worker:
    image: apache/spark:${SPARK_VERSION:-4.0.2}-python3
    container_name: ml-spark-worker
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    environment:
      <<: *spark-common-env
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2G}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
    volumes:
      - spark-warehouse:/opt/spark/warehouse
      - spark-ivy-cache:/home/spark/.ivy2
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      - spark-master
    networks:
      - quantum-net

  # --- airflow (3.x with CeleryExecutor) ---

  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: ml-airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_POSTGRES_USER:-airflow}"]
      interval: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-bookworm
    container_name: ml-redis
    expose:
      - 6379
    volumes:
      - redis-data:/data
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  airflow-init:
    <<: *airflow-common
    container_name: ml-airflow-init
    depends_on:
      <<: *airflow-common-depends-on
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username $${AIRFLOW_ADMIN_USERNAME:-admin} \
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname $${AIRFLOW_ADMIN_FIRSTNAME:-Admin} \
          --lastname $${AIRFLOW_ADMIN_LASTNAME:-User} \
          --role Admin \
          --email $${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true &&
        airflow connections add 'spark_default' \
          --conn-type 'spark' \
          --conn-host 'spark://$${SPARK_MASTER_HOST:-spark-master}:$${SPARK_MASTER_PORT:-7077}' \
          --conn-extra '{"queue": "$${SPARK_DEFAULT_QUEUE:-default}"}' || true
    environment:
      <<: *airflow-common-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Admin}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-User}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    user: "0:0"

  airflow-apiserver:
    <<: *airflow-common
    container_name: ml-airflow-apiserver
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8084}:8080"
    command: api-server
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: ml-airflow-scheduler
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-dag-processor:
    <<: *airflow-common
    container_name: ml-airflow-dag-processor
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-worker:
    <<: *airflow-common
    container_name: ml-airflow-worker
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    command: celery worker
    healthcheck:
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-triggerer:
    <<: *airflow-common
    container_name: ml-airflow-triggerer
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # --- mlflow experiment tracking ---

  mlflow:
    image: ghcr.io/mlflow/mlflow:${MLFLOW_VERSION:-v2.16.0}
    container_name: ml-mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: "sqlite:////mlflow/mlflow.db"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "/mlflow/artifacts"
    command: >
      mlflow server
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    volumes:
      - mlflow-data:/mlflow
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- vqe batch generation containers (no command: injected via docker compose run) ---

  quantum-pipeline-gpu1:
    image: quantum-pipeline:gpu
    networks:
      - quantum-net
    environment:
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:9092}
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:-http://schema-registry:8081}
    volumes:
      - ../data:/usr/src/quantum_pipeline/data:ro
      - ../gen:/usr/src/quantum_pipeline/gen
    profiles:
      - batch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  quantum-pipeline-gpu2:
    image: quantum-pipeline:gpu
    networks:
      - quantum-net
    environment:
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:9092}
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:-http://schema-registry:8081}
    volumes:
      - ../data:/usr/src/quantum_pipeline/data:ro
      - ../gen:/usr/src/quantum_pipeline/gen
    profiles:
      - batch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]

  quantum-pipeline-cpu:
    image: quantum-pipeline:cpu
    networks:
      - quantum-net
    environment:
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:9092}
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:-http://schema-registry:8081}
    volumes:
      - ../data:/usr/src/quantum_pipeline/data:ro
      - ../gen:/usr/src/quantum_pipeline/gen
    profiles:
      - batch
