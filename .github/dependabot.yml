version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types:
          - patch
          - minor
      major:
        update-types:
          - major
    reviewers:
      - straightchlorine
    labels:
      - dependencies
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types:
          - patch
          - minor
      major:
        update-types:
          - major
    reviewers:
      - straightchlorine
    labels:
      - ci
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directories:
      - /docker
      - /docker/airflow
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    reviewers:
      - straightchlorine
    labels:
      - docker
    open-pull-requests-limit: 5
