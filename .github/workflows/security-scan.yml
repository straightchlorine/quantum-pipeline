name: Security Scan

# Informational only for now.
# Findings land in the Security tab via SARIF upload.

on:
  schedule:
    - cron: "0 6 * * 3"
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "docker/**"
      - pyproject.toml
      - pdm.lock

permissions:
  contents: read

jobs:
  # Weekly scan of the published image
  scan-published:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: docker.io/straightchlorine/quantum-pipeline:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          timeout: 15m

      - name: Upload report to Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-published

  # Scan the CPU image
  scan-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build CPU image locally
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./docker/Dockerfile.cpu
          push: false
          load: true
          tags: quantum-pipeline:scan
          cache-from: type=gha

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: quantum-pipeline:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          timeout: 15m

      - name: Upload report to Security tab
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-pr

      - name: Print report for fork PRs
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: quantum-pipeline:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          skip-setup-trivy: true
